<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Size Monitor</title>
<style>
:root {
  --bg:       #0d1117;
  --card:     #161b22;
  --border:   #21262d;
  --text:     #e6edf3;
  --muted:    #7d8590;
  --blue:     #58a6ff;
  --green:    #3fb950;
  --red:      #f85149;
  --orange:   #d29922;
  --purple:   #bc8cff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 13px; }

header {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
header h1 { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.tag { font-size: 11px; background: #1f2937; border: 1px solid var(--border); color: var(--muted); padding: 2px 8px; border-radius: 20px; }

.controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
select, button {
  background: var(--card); border: 1px solid var(--border); color: var(--text);
  padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; outline: none;
}
select:focus { border-color: var(--blue); }
button { background: #1f6feb; border-color: #1f6feb; font-weight: 600; }
button:hover { background: #388bfd; }
button:disabled { opacity: .5; cursor: not-allowed; }
.btn-ghost { background: transparent; border-color: var(--border); color: var(--text); }
.btn-ghost:hover { border-color: var(--blue); color: var(--blue); background: transparent; }

main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

.summary-bar {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px; margin-bottom: 20px;
}
.stat-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 16px;
}
.stat-card .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
.stat-card .value { font-size: 22px; font-weight: 700; }
.stat-card .sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }

.panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
.panel-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.panel-header h2 { font-size: 13px; font-weight: 600; }
.db-pill { font-size: 11px; padding: 2px 10px; border-radius: 20px; font-weight: 600; }
.db-prismis         { background: rgba(188,140,255,.15); color: var(--purple); }
.db-performanceroute{ background: rgba(88,166,255,.15);  color: var(--blue); }

table { width: 100%; border-collapse: collapse; }
thead th {
  padding: 8px 14px; text-align: left; font-size: 11px; color: var(--muted);
  text-transform: uppercase; letter-spacing: .6px; border-bottom: 1px solid var(--border);
  white-space: nowrap; cursor: pointer; user-select: none;
}
thead th:hover { color: var(--text); }
thead th.asc::after  { content: ' ▲'; color: var(--blue); }
thead th.desc::after { content: ' ▼'; color: var(--blue); }
tbody tr { border-bottom: 1px solid rgba(33,38,45,.8); transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(33,38,45,.6); }
tbody td { padding: 8px 14px; }

.size-cell { display: flex; align-items: center; gap: 8px; }
.bar-track { width: 70px; height: 4px; background: var(--border); border-radius: 3px; flex-shrink: 0; }
.bar-fill  { height: 100%; border-radius: 3px; }

.delta-pos { color: var(--red);    font-weight: 600; }
.delta-neg { color: var(--green);  font-weight: 600; }
.delta-zero{ color: var(--muted); }

.no-data { text-align: center; padding: 48px; color: var(--muted); }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.db-tabs { display: flex; gap: 6px; }
.db-tab { padding: 4px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 12px; font-weight: 600; }
.db-tab.active-prismis          { background: rgba(188,140,255,.15); border-color: var(--purple); color: var(--purple); }
.db-tab.active-performanceroute { background: rgba(88,166,255,.15);  border-color: var(--blue);   color: var(--blue); }
.db-tab.active-all              { background: rgba(63,185,80,.1);    border-color: var(--green);  color: var(--green); }

input[type=text] {
  background: var(--card); border: 1px solid var(--border); color: var(--text);
  padding: 6px 10px; border-radius: 6px; font-size: 12px; outline: none; width: 180px;
}
input[type=text]:focus { border-color: var(--blue); }

.ts-info { font-size: 11px; color: var(--muted); }
.ts-info span { color: var(--text); }
</style>
</head>
<body>

<header>
  <h1>🗄 DB Size Monitor <span class="tag">performanceroute & prismis</span></h1>
  <div class="controls">
    <div class="ts-info">From: <span id="lbl-t1">—</span></div>
    <div class="ts-info">To: <span id="lbl-t2">—</span></div>
    <select id="sel-t1" onchange="load()"><option value="">— select —</option></select>
    <select id="sel-t2" onchange="load()"><option value="">— select —</option></select>
    <button class="btn-ghost" onclick="usefirstlast()">First → Last</button>
    <button id="btn-run" onclick="triggerCheck()">▶ Run Now</button>
  </div>
</header>

<main>
  <div class="summary-bar" id="summary"></div>

  <div class="panel">
    <div class="panel-header">
      <h2>Table Growth</h2>
      <div style="display:flex;gap:10px;align-items:center;">
        <input type="text" id="search" placeholder="Search table…" oninput="render()">
        <div class="db-tabs">
          <button class="db-tab active-all" onclick="setDb('all',this)">All</button>
          <button class="db-tab" onclick="setDb('performanceroute',this)">performanceroute</button>
          <button class="db-tab" onclick="setDb('prismis',this)">prismis</button>
        </div>
      </div>
    </div>
    <div id="table-wrap"><div class="no-data"><span class="spinner"></span></div></div>
  </div>
</main>

<script>
let allRows = [];
let activeDb = 'all';
let sortCol  = 'delta_mb';
let sortDir  = 'desc';
let maxSize  = 1;

function fmtMb(mb) {
  if (!mb && mb !== 0) return '—';
  const v = parseFloat(mb);
  if (v >= 1024) return (v/1024).toFixed(2) + ' GB';
  return v.toFixed(2) + ' MB';
}
function fmtRows(n) {
  if (!n) return '—';
  if (n >= 1e9) return (n/1e9).toFixed(1)+'B';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return n;
}
function fmtTs(iso) {
  if (!iso) return '—';
  return iso.replace('T',' ').slice(0,16);
}
function dbColor(db) {
  return db === 'prismis' ? 'var(--purple)' : 'var(--blue)';
}
function dbPill(db) {
  return `<span class="db-pill db-${db}">${db}</span>`;
}

// ── timestamps ───────────────────────────────────────────
async function loadTimestamps() {
  const r = await fetch('/api/timestamps');
  const d = await r.json();
  const ts = d.timestamps;

  ['sel-t1','sel-t2'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = '<option value="">— select —</option>';
    ts.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t; opt.textContent = fmtTs(t);
      sel.appendChild(opt);
    });
  });

  if (ts.length >= 1) {
    document.getElementById('sel-t1').value = ts[ts.length-1]; // oldest first
    document.getElementById('sel-t2').value = ts[0];           // newest last
    load();
  }
}

function usefirstlast() {
  const sel1 = document.getElementById('sel-t1');
  const sel2 = document.getElementById('sel-t2');
  const opts1 = [...sel1.options].filter(o=>o.value).map(o=>o.value);
  if (opts1.length < 1) return;
  sel1.value = opts1[opts1.length-1];  // oldest
  sel2.value = opts1[0];               // newest
  load();
}

// ── load data ────────────────────────────────────────────
async function load() {
  const t1 = document.getElementById('sel-t1').value;
  const t2 = document.getElementById('sel-t2').value;
  if (!t1 || !t2) return;

  document.getElementById('table-wrap').innerHTML = '<div class="no-data"><span class="spinner"></span></div>';

  const url = `/api/growth?t1=${encodeURIComponent(t1)}&t2=${encodeURIComponent(t2)}`;
  const r = await fetch(url);
  const d = await r.json();

  document.getElementById('lbl-t1').textContent = fmtTs(d.t1);
  document.getElementById('lbl-t2').textContent = fmtTs(d.t2);

  allRows = d.rows || [];
  maxSize  = Math.max(...allRows.map(r => r.size_t2 || 0), 1);
  renderSummary(d.t1, d.t2);
  render();
}

// ── summary cards ────────────────────────────────────────
function renderSummary(t1, t2) {
  const byDb = {};
  allRows.forEach(r => {
    if (!byDb[r.db_name]) byDb[r.db_name] = { total_t1:0, total_t2:0, tables:0 };
    byDb[r.db_name].total_t1 += r.size_t1 || 0;
    byDb[r.db_name].total_t2 += r.size_t2 || 0;
    byDb[r.db_name].tables++;
  });

  let html = '';
  Object.entries(byDb).forEach(([db, s]) => {
    const delta = s.total_t2 - s.total_t1;
    const sign  = delta > 0 ? '+' : '';
    const col   = delta > 0 ? 'var(--red)' : delta < 0 ? 'var(--green)' : 'var(--muted)';
    html += `
      <div class="stat-card">
        <div class="label">${db}</div>
        <div class="value" style="color:${dbColor(db)}">${fmtMb(s.total_t2)}</div>
        <div class="sub" style="color:${col}">${sign}${fmtMb(delta)} over period</div>
        <div class="sub">${s.tables} tables</div>
      </div>`;
  });

  const totalT1 = allRows.reduce((s,r)=>s+(r.size_t1||0),0);
  const totalT2 = allRows.reduce((s,r)=>s+(r.size_t2||0),0);
  const totalD  = totalT2 - totalT1;
  const sign    = totalD > 0 ? '+' : '';
  const col     = totalD > 0 ? 'var(--red)' : totalD < 0 ? 'var(--green)' : 'var(--muted)';
  html += `
    <div class="stat-card">
      <div class="label">Total Growth</div>
      <div class="value" style="color:${col}">${sign}${fmtMb(totalD)}</div>
      <div class="sub">${fmtTs(t1)}</div>
      <div class="sub">→ ${fmtTs(t2)}</div>
    </div>`;

  const top = [...allRows].sort((a,b)=>(b.delta_mb||0)-(a.delta_mb||0))[0];
  if (top) {
    html += `
      <div class="stat-card">
        <div class="label">Fastest Growing</div>
        <div class="value" style="font-size:14px;color:var(--red)">${top.table_name}</div>
        <div class="sub">${dbPill(top.db_name)}</div>
        <div class="sub" style="color:var(--red);font-weight:600">+${fmtMb(top.delta_mb)}</div>
      </div>`;
  }

  document.getElementById('summary').innerHTML = html;
}

// ── table render ─────────────────────────────────────────
function setDb(db, btn) {
  activeDb = db;
  document.querySelectorAll('.db-tab').forEach(b => b.className = 'db-tab');
  btn.className = `db-tab active-${db}`;
  render();
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  let data = allRows.filter(r =>
    (activeDb === 'all' || r.db_name === activeDb) &&
    (!search || r.table_name.toLowerCase().includes(search) || r.db_name.toLowerCase().includes(search))
  );

  data.sort((a,b) => {
    let av = a[sortCol] ?? 0, bv = b[sortCol] ?? 0;
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    return sortDir === 'asc' ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
  });

  if (data.length === 0) {
    document.getElementById('table-wrap').innerHTML = '<div class="no-data">No data</div>';
    return;
  }

  const cols = [
    { key: 'db_name',    label: 'Database' },
    { key: 'table_name', label: 'Table' },
    { key: 'size_t1',    label: 'Size (from)' },
    { key: 'size_t2',    label: 'Size (to)' },
    { key: 'delta_mb',   label: 'Growth' },
    { key: 'rows_t2',    label: 'Rows' },
  ];

  const thead = cols.map(c => {
    let cls = '';
    if (sortCol === c.key) cls = sortDir === 'asc' ? 'asc' : 'desc';
    return `<th class="${cls}" onclick="sortBy('${c.key}')">${c.label}</th>`;
  }).join('');

  const tbody = data.map(r => {
    const pct   = Math.min(((r.size_t2||0) / maxSize) * 100, 100);
    const color = dbColor(r.db_name);
    const delta = r.delta_mb || 0;
    const dCls  = delta > 0.01 ? 'delta-pos' : delta < -0.01 ? 'delta-neg' : 'delta-zero';
    const dStr  = delta > 0.01 ? `+${fmtMb(delta)}` : delta < -0.01 ? fmtMb(delta) : '—';

    return `<tr>
      <td>${dbPill(r.db_name)}</td>
      <td><strong>${r.table_name}</strong></td>
      <td>${fmtMb(r.size_t1)}</td>
      <td>
        <div class="size-cell">
          ${fmtMb(r.size_t2)}
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
        </div>
      </td>
      <td class="${dCls}">${dStr}</td>
      <td style="color:var(--muted)">${fmtRows(r.rows_t2)}</td>
    </tr>`;
  }).join('');

  document.getElementById('table-wrap').innerHTML =
    `<table><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>`;
}

function sortBy(key) {
  if (sortCol === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortCol = key; sortDir = 'desc'; }
  render();
}

// ── manual trigger ───────────────────────────────────────
async function triggerCheck() {
  const btn = document.getElementById('btn-run');
  btn.disabled = true; btn.textContent = '⏳ Running…';
  try {
    const r = await fetch('/api/trigger');
    const d = await r.json();
    if (d.ok) { btn.textContent = '✓ Done'; await loadTimestamps(); }
    else       { btn.textContent = '✗ Error'; console.error(d.error); }
  } catch(e) { btn.textContent = '✗ Error'; }
  setTimeout(() => { btn.disabled = false; btn.textContent = '▶ Run Now'; }, 3000);
}

loadTimestamps();
</script>
</body>
</html>
