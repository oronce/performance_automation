<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cell Map View</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      padding: 10px 18px;
      background: #16213e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      z-index: 1001;
      position: relative;
      min-height: 54px;
    }

    .tb-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tb-label {
      font-size: 12px;
      color: #7f8c8d;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      white-space: nowrap;
    }

    .tb-btn {
      padding: 6px 14px;
      border: 1.5px solid #3498db;
      border-radius: 5px;
      background: transparent;
      color: #3498db;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tb-btn.active, .tb-btn:hover { background: #3498db; color: #fff; }

    .tb-select {
      background: #0f3460;
      border: 1.5px solid #3498db;
      border-radius: 5px;
      color: #fff;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
    }

    .tb-input {
      width: 80px;
      background: #0f3460;
      border: 1.5px solid #3498db;
      border-radius: 5px;
      color: #fff;
      padding: 6px 10px;
      font-size: 13px;
    }

    .tb-info {
      font-size: 12px;
      color: #3498db;
      font-weight: 600;
    }

    /* ── Map ── */
    #map {
      width: 100vw;
      height: calc(100vh - 54px);
    }

    /* ── Loading overlay ── */
    #map-loading {
      position: fixed;
      top: 54px;
      left: 0; right: 0; bottom: 0;
      background: rgba(26,26,46,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .map-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #333;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Status bar ── */
    #map-status {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(22,33,62,0.92);
      color: #aaa;
      padding: 7px 18px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 1000;
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── Legend ── */
    #legend {
      position: fixed;
      bottom: 60px;
      right: 18px;
      background: rgba(22,33,62,0.96);
      border-radius: 8px;
      padding: 12px 16px;
      z-index: 1000;
      font-size: 13px;
      min-width: 190px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    #legend h4 {
      color: #eee;
      margin-bottom: 10px;
      font-size: 14px;
      border-bottom: 1px solid #2c3e50;
      padding-bottom: 6px;
    }

    .leg-item {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 7px;
      color: #ccc;
      font-size: 12px;
    }

    .leg-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.3);
      flex-shrink: 0;
    }

    /* Leaflet tooltip override */
    .leaflet-tooltip {
      background: rgba(22,33,62,0.97) !important;
      border: 1px solid #3498db !important;
      color: #eee !important;
      font-size: 13px;
      padding: 8px 12px;
      line-height: 1.7;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4) !important;
    }

    .leaflet-tooltip::before { border-right-color: #3498db !important; }
  </style>
</head>
<body>

  <div id="toolbar">
    <div class="tb-group">
      <span class="tb-label">KPI</span>
      <select class="tb-select" id="kpi-select">
        <option value="CSSR">CSSR (%)</option>
        <option value="AVAILABILITY">Cell Availability (%)</option>
        <option value="CDR">CDR (%)</option>
        <option value="CBR">CBR (%)</option>
        <option value="TCH_CONG">TCH Congestion (%)</option>
        <option value="SDCCH_DROP">SDCCH Drop Rate (%)</option>
        <option value="SDCCH_CONG">SDCCH Congestion (%)</option>
        <option value="TRAFFIC_VOIX">Voice Traffic (Erl)</option>
      </select>
    </div>

    <div class="tb-group">
      <span class="tb-label">Threshold</span>
      <input type="number" class="tb-input" id="threshold-input" value="99" step="0.1">
      <span class="tb-label" id="threshold-dir">(&lt; bad)</span>
    </div>

    <div class="tb-group">
      <span class="tb-label">Vendor</span>
      <button class="tb-btn active" data-map-vendor="BOTH">Both</button>
      <button class="tb-btn" data-map-vendor="ERICSSON">Ericsson</button>
      <button class="tb-btn" data-map-vendor="HUAWEI">Huawei</button>
    </div>

    <div class="tb-group">
      <span class="tb-label">Top N <span style="color:#7f8c8d;font-size:10px;font-weight:400;">(by CSR Failures)</span></span>
      <select class="tb-select" id="top-n-select">
        <option value="0">All</option>
        <option value="10">Top 10</option>
        <option value="20">Top 20</option>
        <option value="50" selected>Top 50</option>
        <option value="100">Top 100</option>
        <option value="200">Top 200</option>
      </select>
    </div>

    <div class="tb-group">
      <span class="tb-info" id="tb-info"></span>
    </div>
  </div>

  <div id="map-loading">
    <div class="map-spinner"></div>
    <p style="color:#7f8c8d;">Fetching cell data...</p>
  </div>

  <div id="map"></div>

  <div id="map-status">–</div>

  <div id="legend">
    <h4>Legend</h4>
    <div class="leg-item">
      <div class="leg-dot" style="background:#e74c3c;"></div>
      <span id="leg-bad">CSSR &lt; 99</span>
    </div>
    <div class="leg-item">
      <div class="leg-dot" style="background:#2ecc71;"></div>
      <span id="leg-good">CSSR &#8805; 99</span>
    </div>
    <div class="leg-item">
      <div class="leg-dot" style="background:#95a5a6; opacity:0.6;"></div>
      <span>No KPI value</span>
    </div>
    <div class="leg-item" style="margin-top:8px; border-top:1px solid #2c3e50; padding-top:8px; color:#7f8c8d; font-size:11px;">
      <span id="leg-period">–</span>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/map.js?v=1"></script>
</body>
</html>
