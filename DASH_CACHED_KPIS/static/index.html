<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2G KPI Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>2G Network KPI Dashboard</h1>
      <p class="subtitle">CSSR · Availability · Packet Loss</p>
    </header>

    <div class="filter-section">
      <!-- Row 1: KPI + Vendor -->
      <div class="filter-row">
        <div class="filter-group">
          <label>KPI</label>
          <div class="btn-group">
            <button class="btn btn-toggle active" data-kpi="CSSR">CSSR</button>
            <button class="btn btn-toggle" data-kpi="AVAILABILITY">Availability</button>
            <button class="btn btn-toggle" data-kpi="PACKET_LOSS">Packet Loss</button>
          </div>
        </div>
        <div class="filter-group">
          <label>Vendor</label>
          <div class="btn-group">
            <button class="btn btn-toggle active" data-vendor="ERICSSON">Ericsson</button>
            <button class="btn btn-toggle" data-vendor="HUAWEI">Huawei</button>
          </div>
        </div>
      </div>

      <!-- Row 2: Granularity + Level + Quick select -->
      <div class="filter-row">
        <div class="filter-group">
          <label>Granularity</label>
          <div class="btn-group">
            <button class="btn btn-toggle" data-granularity="DAILY">Daily</button>
            <button class="btn btn-toggle active" data-granularity="HOURLY">Hourly</button>
          </div>
        </div>
        <div class="filter-group">
          <label>Breakdown Level</label>
          <div class="btn-group">
            <button class="btn btn-toggle active" data-level="commune">Commune</button>
            <button class="btn btn-toggle" data-level="arrondissement">Arrondissement</button>
          </div>
        </div>
        <div class="filter-group">
          <label>Quick Select</label>
          <div class="quick-buttons">
            <button class="btn btn-quick active" data-days="2">2D</button>
            <button class="btn btn-quick" data-days="3">3D</button>
            <button class="btn btn-quick" data-days="5">5D</button>
            <button class="btn btn-quick" data-days="7">7D</button>
            <button class="btn btn-quick" data-days="8">8D</button>
          </div>
        </div>
      </div>

      <!-- Row 3: Custom date range -->
      <div class="filter-row">
        <div class="filter-group">
          <label>Custom Date Range</label>
          <div class="date-inputs">
            <input type="date" id="start-date" class="date-input">
            <span>to</span>
            <input type="date" id="end-date" class="date-input">
            <button class="btn btn-primary" id="apply-btn">Apply</button>
          </div>
        </div>
      </div>

      <div class="filter-info">
        <span id="current-range"></span>
        <span id="error-msg" class="error-msg"></span>
      </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Loading data...</p>
    </div>

    <!-- Charts -->
    <div id="main-content" style="display:none;">

      <!-- Overview: network-wide -->
      <div class="chart-card">
        <h3 class="chart-title" id="overview-title">CSSR — Network</h3>
        <div class="chart-wrapper" id="overview-wrapper">
          <canvas id="overview-chart"></canvas>
        </div>
      </div>

      <!-- Breakdown: one chart per location -->
      <div style="margin-top:30px;">
        <h2 class="section-title" id="breakdown-section-title">CSSR — By Commune</h2>

        <!-- Search / filter bar -->
        <div class="search-bar">
          <input type="text" id="loc-search" class="loc-search-input" placeholder="Search location...">
          <button class="btn btn-quick" id="search-clear">Clear</button>
          <span id="loc-count" class="loc-count"></span>
        </div>

        <div class="charts-grid" id="breakdown-container">
          <!-- injected by script.js -->
        </div>
      </div>

    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
